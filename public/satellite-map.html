<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body, #map { width: 100%; height: 100%; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }

    #locate-btn {
      position: absolute;
      bottom: 80px;
      right: 10px;
      z-index: 1000;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: #fff;
      border: none;
      box-shadow: 0 2px 6px rgba(0,0,0,0.35);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }
    #locate-btn svg { width: 20px; height: 20px; transition: all 0.2s; }

    #legend {
      position: absolute;
      bottom: 16px;
      left: 10px;
      z-index: 1000;
      background: rgba(0,0,0,0.55);
      border-radius: 8px;
      padding: 8px 10px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .legend-row {
      display: flex;
      align-items: center;
      gap: 7px;
      color: #fff;
      font-size: 11px;
    }

    /* ── Custom pin popup ── */
    .pin-popup .leaflet-popup-content-wrapper {
      border-radius: 12px;
      padding: 0;
      box-shadow: 0 4px 24px rgba(0,0,0,0.22);
      min-width: 220px;
    }
    .pin-popup .leaflet-popup-content {
      margin: 0;
      padding: 12px 14px 14px;
    }
    .pin-popup .leaflet-popup-tip-container { display: none; }
    .pin-popup .leaflet-popup-close-button  { display: none; }

    .popup-close {
      position: absolute;
      top: 8px;
      right: 8px;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: #f5f5f5;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .popup-close:active { opacity: 0.6; }
    .pin-popup .leaflet-popup-content-wrapper { position: relative; }

    .popup-badge {
      display: inline-block;
      font-size: 11px;
      font-weight: 600;
      color: #fff;
      padding: 2px 8px;
      border-radius: 20px;
      margin-bottom: 8px;
    }
    .popup-title {
      font-size: 15px;
      font-weight: 600;
      color: #111;
      margin-bottom: 3px;
    }
    .popup-desc {
      font-size: 13px;
      color: #555;
      margin-bottom: 8px;
    }
    .popup-coords {
      font-size: 11px;
      color: #999;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    @keyframes loc-pulse {
      0%   { r: 14; opacity: 0.5; }
      100% { r: 28; opacity: 0; }
    }
    .pulse-ring { animation: loc-pulse 2s ease-out infinite; }
  </style>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body>
  <div id="map"></div>

  <button id="locate-btn" title="My location">
    <svg id="locate-icon" viewBox="0 0 24 24" width="20" height="20">
      <path id="locate-arrow" d="M12 2 L5.5 21 L12 17.5 L18.5 21 Z" stroke-linejoin="round"/>
    </svg>
  </button>

  <div id="legend">
    <div class="legend-row">
      <svg width="16" height="21" viewBox="0 0 32 42" style="flex-shrink:0">
        <path d="M16 0C7.163 0 0 7.163 0 16c0 11 16 26 16 26S32 27 32 16C32 7.163 24.837 0 16 0z" fill="#F59E0B" stroke="rgba(255,255,255,0.9)" stroke-width="1.5"/>
        <g transform="translate(16,13)">
          <rect x="-1" y="-10" width="2" height="3" rx="1" fill="white"/>
          <path d="M-6,0 C-6,-6 -3.5,-8 0,-8 C3.5,-8 6,-6 6,0 Z" fill="white"/>
          <rect x="-7" y="0" width="14" height="2.5" rx="1.25" fill="white"/>
          <circle cx="0" cy="4.5" r="2" fill="white"/>
        </g>
      </svg>
      <span>Pranešimas</span>
    </div>
    <div class="legend-row">
      <svg width="16" height="21" viewBox="0 0 32 42" style="flex-shrink:0">
        <path d="M16 0C7.163 0 0 7.163 0 16c0 11 16 26 16 26S32 27 32 16C32 7.163 24.837 0 16 0z" fill="#43A047" stroke="rgba(255,255,255,0.9)" stroke-width="1.5"/>
        <g transform="translate(16,14)">
          <rect x="-1.5" y="-1" width="3" height="12" rx="1.5" fill="white" transform="rotate(40)"/>
          <rect x="-7" y="-10" width="10" height="5" rx="2" fill="white" transform="rotate(40)"/>
        </g>
      </svg>
      <span>Darbo užsakymas</span>
    </div>
    <div class="legend-row">
      <svg width="16" height="16" viewBox="0 0 32 32" style="flex-shrink:0">
        <circle cx="16" cy="16" r="9" fill="#1976D2" stroke="white" stroke-width="2.5"/>
      </svg>
      <span>Mano vieta</span>
    </div>
  </div>

  <script>
    const map = L.map('map', { zoomControl: false, attributionControl: false })
      .setView([54.640204, 25.227166], 18);

    L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
      maxZoom: 19,
    }).addTo(map);

    const MY_LOCATION = [54.640204, 25.227166];

    // ── Distance helpers ─────────────────────────────────────────
    function distanceM(a, b) {
      const R = 6371000;
      const dLat = (b.lat - a.lat) * Math.PI / 180;
      const dLng = (b.lng - a.lng) * Math.PI / 180;
      const sin2 = Math.sin(dLat/2)**2 + Math.cos(a.lat*Math.PI/180)*Math.cos(b.lat*Math.PI/180)*Math.sin(dLng/2)**2;
      return R * 2 * Math.asin(Math.sqrt(sin2));
    }
    function formatDist(m) {
      if (m < 1000) return `${Math.round(m/10)*10} m`;
      return (m/1000).toLocaleString('lt-LT', { maximumFractionDigits: 1 }) + ' km';
    }

    // ── White icon SVG snippets ───────────────────────────────────
    const bellSvg = `
      <g transform="translate(16,13)">
        <rect x="-1" y="-10" width="2" height="3" rx="1" fill="white"/>
        <path d="M-6,0 C-6,-6 -3.5,-8 0,-8 C3.5,-8 6,-6 6,0 Z" fill="white"/>
        <rect x="-7" y="0" width="14" height="2.5" rx="1.25" fill="white"/>
        <circle cx="0" cy="4.5" r="2" fill="white"/>
      </g>`;

    const hammerSvg = `
      <g transform="translate(16,14)">
        <rect x="-1.5" y="-1" width="3" height="12" rx="1.5" fill="white" transform="rotate(40)"/>
        <rect x="-7" y="-10" width="10" height="5" rx="2" fill="white" transform="rotate(40)"/>
      </g>`;

    // ── Pin icon factory ──────────────────────────────────────────
    function darken(hex) {
      const r = parseInt(hex.slice(1,3), 16);
      const g = parseInt(hex.slice(3,5), 16);
      const b = parseInt(hex.slice(5,7), 16);
      return `rgb(${Math.floor(r/2)},${Math.floor(g/2)},${Math.floor(b/2)})`;
    }

    function pinIcon(color, iconSvg, selected) {
      const stroke      = selected ? darken(color) : 'rgba(255,255,255,0.9)';
      const strokeWidth = selected ? '2.5' : '1.5';
      return L.divIcon({
        className: '',
        html: `
          <svg width="40" height="52" viewBox="0 0 32 42" style="overflow:visible">
            <path d="M16 0C7.163 0 0 7.163 0 16c0 11 16 26 16 26S32 27 32 16C32 7.163 24.837 0 16 0z"
              fill="${color}" stroke="${stroke}" stroke-width="${strokeWidth}"/>
            ${iconSvg}
          </svg>`,
        iconSize: [40, 52],
        iconAnchor: [20, 52],
      });
    }

    function getIcon(p, selected) {
      const color   = p.type === 'notification' ? '#F59E0B' : '#43A047';
      const iconSvg = p.type === 'notification' ? bellSvg   : hammerSvg;
      return pinIcon(color, iconSvg, selected);
    }

    // ── Pan map so pin + popup are centered ───────────────────────
    // popup ~130px tall + 52px pin + 8px gap = ~190px total; center offset = ~95px above anchor
    function panToPin(latlng) {
      const zoom  = map.getZoom();
      const px    = map.project(latlng, zoom);
      const target = map.unproject(L.point(px.x, px.y - 95), zoom);
      map.panTo(target, { animate: true, duration: 0.4 });
    }

    // ── Pins ──────────────────────────────────────────────────────
    const pins = [
      { lat: 54.639997, lng: 25.226488, title: 'WO-00422',                   desc: 'Bėgių patikrinimas — REL',        type: 'wo'           },
      { lat: 54.640442, lng: 25.227803, title: 'Bėgių apžiūra',              desc: 'Įtrūkęs bėgis',                  type: 'notification' },
      { lat: 54.640704, lng: 25.228993, title: 'Iešmo patikrinimas',         desc: 'Neveikia automatinis iešmas',     type: 'notification' },
      { lat: 54.640115, lng: 25.226794, title: 'WO-00423',                   desc: 'Kontaktinio tinklo remontas — MSGS', type: 'wo'        },
      { lat: 54.639713, lng: 25.225366, title: 'Semaforo lempos keitimas',   desc: 'Gedusi signalinė lempa',          type: 'notification' },
    ];

    let activeMarker = null;
    let activePin    = null;

    function resetActive() {
      if (activeMarker) {
        activeMarker.setIcon(getIcon(activePin, false));
        activeMarker = null;
        activePin    = null;
      }
    }

    map.on('click', resetActive);
    document.addEventListener('closePin', () => {
      if (activeMarker) activeMarker.closePopup();
      resetActive();
    });

    pins.forEach(p => {
      const color = p.type === 'notification' ? '#F59E0B' : '#43A047';
      const label = p.type === 'notification' ? 'Pranešimas' : 'Darbo užsakymas';

      const popup = L.popup({
        className: 'pin-popup',
        offset: L.point(0, -58),
        autoPan: false,
        closeOnClick: false,
      }).setContent(`
        <button class="popup-close" onclick="document.dispatchEvent(new CustomEvent('closePin'))">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#555" stroke-width="2.5" stroke-linecap="round">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
        <div class="popup-badge" style="background:${color}">${label}</div>
        <div class="popup-title">${p.title}</div>
        <div class="popup-desc">${p.desc}</div>`);

      const marker = L.marker([p.lat, p.lng], { icon: getIcon(p, false) })
        .bindPopup(popup)
        .addTo(map);

      marker.on('click', e => {
        L.DomEvent.stopPropagation(e);
        if (activeMarker === marker) {
          resetActive();
          marker.closePopup();
          return;
        }
        if (activeMarker) {
          activeMarker.setIcon(getIcon(activePin, false));
          activeMarker.closePopup();
        }
        activeMarker = marker;
        activePin    = p;
        marker.setIcon(getIcon(p, true));
        marker.openPopup();
        panToPin([p.lat, p.lng]);
      });
    });

    // ── My location ───────────────────────────────────────────────

    const myLocIcon = L.divIcon({
      className: '',
      html: `
        <svg width="64" height="64" viewBox="0 0 64 64" style="overflow:visible">
          <path d="M32,32 L20,11 A24,24 0 0,1 44,11 Z"
            fill="rgba(25,118,210,0.28)" transform="rotate(20,32,32)"/>
          <circle cx="32" cy="32" r="14"
            fill="rgba(25,118,210,0.15)" stroke="rgba(25,118,210,0.5)" stroke-width="1"
            class="pulse-ring"/>
          <circle cx="32" cy="32" r="9" fill="#1976D2" stroke="white" stroke-width="2.5"/>
        </svg>`,
      iconSize: [64, 64],
      iconAnchor: [32, 32],
    });

    L.marker(MY_LOCATION, { icon: myLocIcon, zIndexOffset: 1000 }).addTo(map);

    const locateArrow = document.getElementById('locate-arrow');

    function updateLocateBtn() {
      const c = map.getCenter();
      const d = distanceM({ lat: c.lat, lng: c.lng }, { lat: MY_LOCATION[0], lng: MY_LOCATION[1] });
      if (d < 10) {
        locateArrow.setAttribute('fill', '#1976d2');
        locateArrow.setAttribute('stroke', '#1976d2');
        locateArrow.setAttribute('stroke-width', '0');
      } else {
        locateArrow.setAttribute('fill', 'none');
        locateArrow.setAttribute('stroke', '#9e9e9e');
        locateArrow.setAttribute('stroke-width', '1.5');
      }
    }

    map.on('move', updateLocateBtn);
    updateLocateBtn();

    document.getElementById('locate-btn').addEventListener('click', () => {
      map.panTo(MY_LOCATION, { animate: true, duration: 0.4 });
    });

    // ── Dynamic pins from React ───────────────────────────────────
    let dynamicMarkers = [];

    function renderDynamicPins(newPins) {
      dynamicMarkers.forEach(m => map.removeLayer(m));
      dynamicMarkers = [];
      newPins.forEach(p => {
        const color = p.type === 'notification' ? '#F59E0B' : '#43A047';
        const label = p.type === 'notification' ? 'Pranešimas' : 'Darbo užsakymas';
        const popup = L.popup({
          className: 'pin-popup',
          offset: L.point(0, -58),
          autoPan: false,
          closeOnClick: false,
        }).setContent(`
          <button class="popup-close" onclick="document.dispatchEvent(new CustomEvent('closePin'))">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#555" stroke-width="2.5" stroke-linecap="round">
              <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
          </button>
          <div class="popup-badge" style="background:${color}">${label}</div>
          <div class="popup-title">${p.title}</div>
          ${p.desc ? `<div class="popup-desc" style="font-size:12px;color:#777;margin-bottom:4px">${p.desc}</div>` : ''}
          <div style="font-size:11px;color:#aaa">${p.createdDate || ''}</div>`);
        const marker = L.marker([p.lat, p.lng], { icon: getIcon(p, false) })
          .bindPopup(popup)
          .addTo(map);
        marker.on('click', e => {
          L.DomEvent.stopPropagation(e);
          if (activeMarker === marker) { resetActive(); marker.closePopup(); return; }
          if (activeMarker) { activeMarker.setIcon(getIcon(activePin, false)); activeMarker.closePopup(); }
          activeMarker = marker; activePin = p;
          marker.setIcon(getIcon(p, true));
          marker.openPopup();
          panToPin([p.lat, p.lng]);
        });
        dynamicMarkers.push(marker);
      });
    }

    window.addEventListener('message', e => {
      if (e.data?.type === 'SET_PINS') renderDynamicPins(e.data.pins);
    });
  </script>
</body>
</html>
