<svg xmlns="http://www.w3.org/2000/svg" width="400" height="533" viewBox="0 0 400 533">
  <defs>
    <!-- Fog turbulence -->
    <filter id="fogFilter" x="-50%" y="-50%" width="200%" height="200%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018 0.012" numOctaves="5" seed="7" result="noise"/>
      <feColorMatrix type="saturate" values="0" in="noise" result="grayNoise"/>
      <feComponentTransfer in="grayNoise" result="softNoise">
        <feFuncA type="linear" slope="0.55" intercept="0.1"/>
      </feComponentTransfer>
      <feBlend in="SourceGraphic" in2="softNoise" mode="screen" result="blend"/>
      <feGaussianBlur in="blend" stdDeviation="1.5"/>
    </filter>

    <!-- Red glow bloom -->
    <filter id="redBloom" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="8" result="blur1"/>
      <feGaussianBlur stdDeviation="18" result="blur2"/>
      <feMerge>
        <feMergeNode in="blur2"/>
        <feMergeNode in="blur1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Soft blur for background -->
    <filter id="bgBlur">
      <feGaussianBlur stdDeviation="2.5"/>
    </filter>

    <!-- Metal texture -->
    <filter id="metalTex">
      <feTurbulence type="turbulence" baseFrequency="0.65" numOctaves="2" seed="2" result="t"/>
      <feColorMatrix type="saturate" values="0" in="t" result="grey"/>
      <feBlend in="SourceGraphic" in2="grey" mode="multiply" result="out"/>
      <feComposite in="out" in2="SourceGraphic" operator="in"/>
    </filter>

    <!-- Noise for wet ground -->
    <filter id="groundNoise">
      <feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="1" seed="9"/>
      <feColorMatrix type="saturate" values="0"/>
      <feBlend in="SourceGraphic" mode="overlay" result="out"/>
      <feComposite in="out" in2="SourceGraphic" operator="in"/>
    </filter>

    <!-- Gradients -->
    <linearGradient id="skyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1f24"/>
      <stop offset="40%" stop-color="#2a3038"/>
      <stop offset="100%" stop-color="#3d4550"/>
    </linearGradient>
    <linearGradient id="groundGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a2c28"/>
      <stop offset="100%" stop-color="#1a1c18"/>
    </linearGradient>
    <radialGradient id="redGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff3300" stop-opacity="1"/>
      <stop offset="35%" stop-color="#ee1100" stop-opacity="0.95"/>
      <stop offset="70%" stop-color="#cc0800" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#880000" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="redFogGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff4422" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#ff2200" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="groundReflect" cx="50%" cy="20%" r="70%">
      <stop offset="0%" stop-color="#881100" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
      <stop offset="40%" stop-color="transparent"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.75"/>
    </radialGradient>
    <linearGradient id="poleGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#111"/>
      <stop offset="30%" stop-color="#2a2a2a"/>
      <stop offset="55%" stop-color="#3a3a3a"/>
      <stop offset="75%" stop-color="#1e1e1e"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </linearGradient>
    <linearGradient id="housingGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0d0d0d"/>
      <stop offset="25%" stop-color="#1f1f1f"/>
      <stop offset="55%" stop-color="#2a2a2a"/>
      <stop offset="80%" stop-color="#171717"/>
      <stop offset="100%" stop-color="#080808"/>
    </linearGradient>
  </defs>

  <!-- ── Sky ── -->
  <rect width="400" height="533" fill="url(#skyGrad)"/>

  <!-- Background trees silhouette (blurred) -->
  <g filter="url(#bgBlur)" opacity="0.6">
    <rect x="-10" y="200" width="30" height="220" fill="#151b1f"/>
    <ellipse cx="5" cy="190" rx="28" ry="50" fill="#151b1f"/>
    <rect x="30" y="220" width="20" height="200" fill="#151b1f"/>
    <ellipse cx="40" cy="210" rx="22" ry="40" fill="#151b1f"/>
    <rect x="60" y="230" width="18" height="190" fill="#151b1f"/>
    <ellipse cx="69" cy="220" rx="20" ry="38" fill="#151b1f"/>
    <rect x="290" y="215" width="22" height="210" fill="#151b1f"/>
    <ellipse cx="301" cy="205" rx="25" ry="45" fill="#151b1f"/>
    <rect x="325" y="225" width="18" height="200" fill="#151b1f"/>
    <ellipse cx="334" cy="215" rx="21" ry="40" fill="#151b1f"/>
    <rect x="355" y="230" width="20" height="190" fill="#151b1f"/>
    <ellipse cx="365" cy="218" rx="24" ry="42" fill="#151b1f"/>
    <rect x="385" y="235" width="25" height="180" fill="#151b1f"/>
    <ellipse cx="397" cy="224" rx="22" ry="38" fill="#151b1f"/>
  </g>

  <!-- Ground / track bed -->
  <rect x="0" y="390" width="400" height="143" fill="url(#groundGrad)" filter="url(#groundNoise)"/>

  <!-- Wet ground sheen -->
  <rect x="0" y="390" width="400" height="143" fill="#1e2226" opacity="0.4"/>

  <!-- Rails -->
  <rect x="140" y="395" width="9" height="138" fill="#4a4a44" rx="2"/>
  <rect x="140" y="395" width="3" height="138" fill="#666" rx="1" opacity="0.6"/>
  <rect x="251" y="395" width="9" height="138" fill="#4a4a44" rx="2"/>
  <rect x="251" y="395" width="3" height="138" fill="#666" rx="1" opacity="0.6"/>

  <!-- Rail rail reflections (wet) -->
  <rect x="140" y="395" width="9" height="50" fill="#882200" opacity="0.2" rx="2"/>
  <rect x="251" y="395" width="9" height="50" fill="#882200" opacity="0.2" rx="2"/>

  <!-- Sleepers -->
  <rect x="120" y="398" width="160" height="9" fill="#2e2820" rx="1"/>
  <rect x="120" y="416" width="160" height="9" fill="#2e2820" rx="1"/>
  <rect x="120" y="434" width="160" height="9" fill="#2e2820" rx="1"/>
  <rect x="120" y="452" width="160" height="9" fill="#2e2820" rx="1"/>
  <rect x="120" y="470" width="160" height="9" fill="#2e2820" rx="1"/>
  <rect x="120" y="488" width="160" height="9" fill="#2e2820" rx="1"/>
  <rect x="120" y="506" width="160" height="9" fill="#2e2820" rx="1"/>
  <rect x="120" y="524" width="160" height="9" fill="#2e2820" rx="1"/>

  <!-- Red light ground reflection -->
  <ellipse cx="200" cy="400" rx="70" ry="20" fill="url(#groundReflect)"/>

  <!-- Signal post -->
  <rect x="193" y="110" width="14" height="290" fill="url(#poleGrad)" rx="3"/>
  <!-- Post edge highlight -->
  <rect x="193" y="110" width="2" height="290" fill="#3a3a3a" rx="1" opacity="0.7"/>
  <!-- Post base flange -->
  <rect x="178" y="388" width="44" height="10" fill="#1a1a1a" rx="3"/>
  <rect x="174" y="394" width="52" height="6" fill="#111" rx="2"/>

  <!-- Signal head housing -->
  <rect x="172" y="88" width="56" height="130" fill="url(#housingGrad)" rx="7" filter="url(#metalTex)"/>
  <!-- Housing left edge highlight -->
  <rect x="173" y="89" width="3" height="128" fill="#2e2e2e" rx="1" opacity="0.6"/>
  <!-- Housing top cap -->
  <rect x="170" y="83" width="60" height="10" fill="#0f0f0f" rx="4"/>

  <!-- Sun visor - red lens -->
  <rect x="174" y="93" width="52" height="7" fill="#0a0a0a" rx="2"/>
  <!-- Sun visor - yellow lens -->
  <rect x="174" y="130" width="52" height="7" fill="#0a0a0a" rx="2"/>
  <!-- Sun visor - green lens -->
  <rect x="174" y="167" width="52" height="7" fill="#0a0a0a" rx="2"/>

  <!-- Mounting bracket -->
  <rect x="200" y="88" width="40" height="6" fill="#1a1a1a" rx="2"/>

  <!-- ── RED LENS — ACTIVE ── -->
  <!-- Deep bloom in fog -->
  <circle cx="200" cy="111" r="42" fill="#ff1100" opacity="0.06" filter="url(#redBloom)"/>
  <!-- Lens housing recess -->
  <circle cx="200" cy="111" r="18" fill="#0a0000"/>
  <!-- Glow -->
  <circle cx="200" cy="111" r="26" fill="url(#redFogGlow)"/>
  <!-- Main lens -->
  <circle cx="200" cy="111" r="15" fill="url(#redGlow)" filter="url(#redBloom)"/>
  <!-- Lens face bright spot -->
  <circle cx="200" cy="111" r="13" fill="#ff3311" opacity="0.9"/>
  <!-- Specular highlight -->
  <ellipse cx="195" cy="106" rx="4.5" ry="3" fill="#ff8866" opacity="0.55"/>
  <circle cx="193" cy="105" r="1.5" fill="#ffaa88" opacity="0.4"/>

  <!-- ── YELLOW LENS — off ── -->
  <circle cx="200" cy="148" r="18" fill="#070600"/>
  <circle cx="200" cy="148" r="14" fill="#0f0e00" opacity="0.95"/>
  <circle cx="200" cy="148" r="12" fill="#1a1800" opacity="0.7"/>

  <!-- ── GREEN LENS — off ── -->
  <circle cx="200" cy="185" r="18" fill="#000a00"/>
  <circle cx="200" cy="185" r="14" fill="#000f00" opacity="0.95"/>
  <circle cx="200" cy="185" r="12" fill="#001800" opacity="0.7"/>

  <!-- ── FOG LAYER ── -->
  <rect width="400" height="533" fill="#8fa0ad" opacity="0.32" filter="url(#fogFilter)"/>

  <!-- Fog wisps -->
  <ellipse cx="60" cy="250" rx="140" ry="55" fill="#9fb0bc" opacity="0.28"/>
  <ellipse cx="340" cy="290" rx="120" ry="45" fill="#9aabba" opacity="0.25"/>
  <ellipse cx="200" cy="120" rx="100" ry="35" fill="#a0b2be" opacity="0.22"/>
  <ellipse cx="100" cy="360" rx="150" ry="40" fill="#95a8b4" opacity="0.3"/>
  <ellipse cx="300" cy="160" rx="80" ry="28" fill="#9caebb" opacity="0.2"/>
  <ellipse cx="30" cy="140" rx="90" ry="30" fill="#a2b4c0" opacity="0.18"/>
  <ellipse cx="370" cy="370" rx="90" ry="35" fill="#97aab6" opacity="0.22"/>

  <!-- Fog glow around red light -->
  <ellipse cx="200" cy="111" rx="80" ry="60" fill="#ff2200" opacity="0.055"/>

  <!-- Moisture droplets (rain streaks) -->
  <g opacity="0.18" stroke="#c8d4da" stroke-width="0.8">
    <line x1="55" y1="0" x2="50" y2="80"/>
    <line x1="90" y1="20" x2="85" y2="110"/>
    <line x1="130" y1="5" x2="125" y2="90"/>
    <line x1="170" y1="0" x2="165" y2="75"/>
    <line x1="230" y1="10" x2="225" y2="95"/>
    <line x1="275" y1="0" x2="270" y2="85"/>
    <line x1="310" y1="15" x2="305" y2="100"/>
    <line x1="350" y1="5" x2="345" y2="88"/>
    <line x1="380" y1="0" x2="375" y2="80"/>
    <line x1="20" y1="30" x2="15" y2="120"/>
  </g>

  <!-- Vignette -->
  <rect width="400" height="533" fill="url(#vignette)"/>

  <!-- Slight cold color grade overlay -->
  <rect width="400" height="533" fill="#1a2530" opacity="0.12"/>
</svg>
